# CodeQL Advanced - Workflow Completo (CORRIGIDO)
# Este workflow executa análise de segurança avançada usando CodeQL
# Documentação: https://docs.github.com/en/code-security/code-scanning

name: "CodeQL Advanced Security Analysis"

on:
  push:
    branches: ["dev", "main", "master"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
  pull_request:
    branches: ["dev", "main", "master"]
    paths-ignore:
      - "**.md"
      - "docs/**"
  schedule:
    # Executa às terças-feiras às 18:45 UTC
    - cron: "45 18 * * 2"
  workflow_dispatch: # Permite execução manual

# Previne execuções concorrentes do mesmo workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Node.js
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        if: matrix.language == 'javascript-typescript'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

      - name: Generate Analysis Report
        if: github.event_name == 'pull_request'
        run: |
          echo "## CodeQL Analysis - ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Analysis completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- **Language:** ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the **Security** tab for detailed results." >> $GITHUB_STEP_SUMMARY

  security-check:
    name: Security Check Summary
    needs: analyze
    runs-on: ubuntu-latest
    if: always()
    permissions: {}

    steps:
      - name: Check analysis results
        run: |
          echo "CodeQL security analysis completed"
          echo "Check the Security > Code scanning tab for results"

      - name: Notify on failure
        if: needs.analyze.result == 'failure'
        run: |
          echo "::error::CodeQL analysis found problems!"
          echo "Review security alerts before merging"
          exit 1
